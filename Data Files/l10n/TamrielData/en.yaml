Magic_miscPasswall: "Passwall"
Magic_miscPasswallDesc: "In an indoor area, this effect permits the caster to pass through a solid barrier to a vacant space behind it. The effect will fail if the destination beyond the traversed barrier is filled with water, is blocked by a forcefield, sigil gate, or ward, or lies above or below the caster."
Magic_miscBanish: "Banish Daedra"
Magic_miscBanishDesc: "Banishes any daedra that the spell is cast upon if the spell's magnitude is greater than or equal to the target's level. If the daedra is wounded, then it will be easier to banish. Banishing a daedra will transfer any of their important belongings to a sigil that is left behind."
Magic_miscReflectDamage: "Reflect Damage"
Magic_miscReflectDamageDesc: "This effect allows the subject to reflect physical damage back at an attacker. The effect's magnitude is the percent damage that will be reflected for each attack. Any unreflected damage is dealt to the defender normally."
Magic_miscDetectHumanoid: "Detect Humanoid"
Magic_miscDetectHumanoidDesc: "The caster of this effect can detect any entity animated by a spirit; they appear on the map as symbols. This effect includes all people. The effect's magnitude is the range in feet from the caster that humanoids are detected."
Magic_miscRadiantShield: "Radiant Shield"
Magic_miscRadiantShieldDesc: "This effect creates a shield of brilliant light around the subject's entire body. The spell adds its magnitude to the subject's Armor Rating, resists harmful magic, and briefly blinds attackers in melee."
Magic_miscRadiantShieldBlindness: "Blinding Radiance"
Magic_miscWabbajack: "Wabbajack"
Magic_miscWabbajackDesc: "Wabbajack!"
Magic_miscInsight: "Insight"
Magic_miscInsightDesc: "This effect lightly twists fate, increasing the chance of discovering valuable items."
Magic_miscArmorResartus: "Armor Resartus"
Magic_miscArmorResartusDesc: "This effect mends and recharges enchanted armor that is equipped by the caster. The magnitude is the units of condition and charge restored, which are distributed across all of the caster's enchanted armor."
Magic_miscWeaponResartus: "Weapon Resartus"
Magic_miscWeaponResartusDesc: "This effect mends and recharges an enchanted weapon that is equipped by the caster. The magnitude is the units of condition and charge restored."
Magic_miscCorruption: "Corruption"
Magic_miscCorruptionDesc: "This effect creates a shadowy counterpart of the target that will aid the caster in combat."
Magic_miscDistractCreature: "Distract Creature"
Magic_miscDistractCreatureDesc: "This effect compels a creature to wander away from their current position while attempting to keep their distance from the caster. The effect's magnitude is the maximum distance that the target can travel and the effect cannot be casted again on the target while it is active. Using this effect will fail if the target is aware of the caster's presence. When the effect ends, the target begins to return to their original location and cannot be distracted again until they do."
Magic_miscDistractHumanoid: "Distract Humanoid"
Magic_miscDistractHumanoidDesc: "This effect compels a person to wander away from their current position while attempting to keep their distance from the caster. The effect's magnitude is the maximum distance that the target can travel and the effect cannot be casted again on the target while it is active. Using this effect will fail if the target is aware of the caster's presence. When the effect ends, the target begins to return to their original location and cannot be distracted again until they do."
Magic_miscGazeOfVeloth: "Gaze of Veloth"
Magic_miscGazeOfVelothDesc: "Witness the Face of Veloth!"
Magic_miscDetectEnemy: "Detect Enemy"
Magic_miscDetectEnemyDesc: "The caster of this effect can detect any entity animated by a spirit; they appear on the map as symbols. This effect includes all hostile beings. The effect's magnitude is the range in feet from the caster that enemies are detected."
Magic_miscDetectInvisibility: "Detect Invisibility"
Magic_miscDetectInvisibilityDesc: "The caster of this effect can detect any entity animated by a spirit; they appear on the map as symbols. This effect includes all beings affected by chameleon or invisibility effects. The effect's magnitude is the range in feet from the caster that hidden beings are detected. The chameleon and invisibility effects on detected entities are also weakened."
Magic_miscBlink: "Blink"
Magic_miscBlinkDesc: "This effect teleports the caster in whatever direction they are looking in. The effect's magnitude is the maximum distance that the caster can move."
Magic_miscFortifyCasting: "Fortify Casting"
Magic_miscFortifyCastingDesc: "This effect raises the subject's chance of successfully casting a spell."
Magic_miscPrismaticLight: "Prismatic Light"
Magic_miscPrismaticLightDesc: "This effect creates a projectile of prismatic light. Upon striking a target, the projectile illuminates the area for the duration of the effect. The light projectile does not cause any damage."
Magic_miscBloodMagic: "Blood Magic"
Magic_miscBloodMagicDesc: "Placeholder"
Magic_miscSanguineRose: "Sanguine Rose"
Magic_miscSanguineRoseDesc: "This effect summons a random daedra from Oblivion. It appears six feet in front of the caster and attacks any entity that attacks the caster until the effect ends or the summoning is killed. At death, or when the effect ends, the summoning disappears, returning to Oblivion. If summoned in town, the guards will attack you and the summoning on sight."
Magic_miscDetectValuables: "Detect Valuables"
Magic_miscDetectValuablesDesc: "The caster of this effect can detect items valued at 4000 drakes or more; they appear on the map as symbols. The effect's magnitude is the range in feet from the caster that items are detected."
Magic_miscMagickaWard: "Magicka Ward"
Magic_miscMagickaWardDesc: "Placeholder"
Magic_miscEthereal: "Ethereal"
Magic_miscEtherealDesc: "The caster of this effect becomes incorporeal and can pass through other entities. The caster is incapable of being harmed by them, but also cannot act upon them, cast magic, use items, or physically interact with the world in general. The caster cannot pass through objects such as walls and still obeys the laws of gravity."

