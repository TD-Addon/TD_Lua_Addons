Settings_TamrielData_page01Main_Description: "Configuration de l'addon Lua de Ressources communes de Tamriel pour OpenMW. OpenMW 0.49 ou plus récent requis."
Settings_TamrielData_page01Main_group01Main: "Paramètres principaux"
Settings_TamrielData_page01Main_group01Main_restrictEquipment: "Restriction d'équipement pour les nouvelles races"
Settings_TamrielData_page01Main_group01Main_restrictEquipment_Description: "Empêche les nouvelles races du mod de porter certains types d'équipement lorsque cela serait physiquement impossible ou poserait problème techniquement.\nRaces et équipement affectés :\n- Empêche les Imgas mâles d'équiper des casques et tous les Imgas d'équiper des bottes ou chaussures."
Settings_TamrielData_page01Main_group02Magic: "Magie"
Settings_TamrielData_page01Main_group02Magic_miscSpells: "Ajout de nouveaux sorts divers"
Settings_TamrielData_page01Main_group02Magic_miscSpells_Description: "Ajoute de nouveaux sorts qui ne rentrent pas dans les catégories habituelles."
Settings_TamrielData_page01Main_group02Magic_summoningSpells: "Ajout de nouveaux sorts d'Invocation"
Settings_TamrielData_page01Main_group02Magic_summoningSpells_Description: "Ajoute de nouveaux sorts d'Invocation utilisant des créatures de Ressources communes de Tamriel comme les consummeurs, les hernes, les sombres séductrices, et les auroriens.\nRequiert un redémarrage.\n\nPar défaut : activé\n\n"
Settings_TamrielData_page01Main_group99Misc: "Divers"
Settings_TamrielData_page01Main_group99Misc_debugLogging: "Journalisation des messages de débug"
Settings_TamrielData_page01Main_group99Misc_debugLogging_Description: "Ajoute plus de logs, par exemple dans les logs d'OpenMW affichés avec la touche F10. Activez cette option si vous souhaitez signaler un problème avec les scripts afin de pouvoir fournir plus d'informations à ce sujet."

TamrielData_main_modName: "Ressources communes de Tamriel"
TamrielData_main_luaApiTooLow: "Fonctionnalité désactivée car elle requiert OpenMW 0.49+ avec la variable Lua {requiredRevision} ou plus récente (version actuelle : {currentRevision}). Envisagez de mettre à jour OpenMW ou désactivez cette option dans Options > Scripts > Ressources communes de Tamriel."
TamrielData_main_noEsmLoaded: "Tamriel_Data.esm n'est pas chargé ! Assurez-vous de l'avoir activé dans les fichiers de données d'OpenMW si vous voulez bénéficier des fonctionnalités de Tamriel_Data.omwscript."
TamrielData_main_publicVersionMismatchWarning: "Version incompatible d'OpenMW détectée. Appuyez sur F10 pour plus d'informations."
TamrielData_main_globalVariableNotDetected: "La variable globale {luaAddonGlobalVariableName} n'a pas été détectée.  Veuillez vous assurer que vous utilisez la version 12 ou plus récente de Ressources communes de Tamriel."

TamrielData_main_imgaHelm: "Les Imgas mâles ne peuvent porter de casque."

TamrielData_magic_passwallWard: "Vous ne pouvez pas passer jusque-là."
TamrielData_magic_passwallAlpha: "Vous ne pouvez pas passer à travers ceci."
TamrielData_magic_passwallExterior: "Vous devez vous trouver dans un espace confiné."
TamrielData_magic_passwallDoorExterior: "Vous ne pouvez pas quitter un espace confiné."
TamrielData_magic_passwallUnderwater: "Vous ne pouvez pas vous trouver sous l'eau."

Magic_summonDevourer: "Appel de consummeur"
Magic_summonDevourerDesc: "Cet effet permet d'invoquer un consummeur des Royaumes extérieurs. Il apparaît à 2 mètres du lanceur et attaque toute entité hostile à son maître jusqu'à ce que le sort prenne fin ou qu'il soit tué. Quand il meurt ou que le sort prend fin, il disparaît et retourne dans les Royaumes extérieurs. En cas d'invocation en ville, les gardes vous attaqueront, vous et votre invocation."
