Magic_miscPasswall: "Passe-muraille"
Magic_miscPasswallDesc: "En intérieur, cet effet permet au lanceur de traverser une barrière solide vers un espace vide derrière celle-ci. L'effet échouera si la destination au-delà de la barrière traversée est emplie d'eau, bloquée par un champ de force, une porte scellée ou une barrière, ou se trouve au-dessus ou au-dessous du lanceur."
Magic_miscBanish: "Bannissement de Daedra"
Magic_miscBanishDesc: "Bannit tout Daedra sur lequel ce sort est lancé, à condition que la cible soit d'un niveau suffisamment bas comparé à la puissance du sort. Si le Daedra est blessé, il sera plus facile à bannir. Bannir un Daedra transfert tous ses biens d'importance dans un sceau laissé à sa place."
Magic_miscReflectDamage: "Réflexion de dégâts"
Magic_miscReflectDamageDesc: "Cet effet permet de renvoyer des dégâts physiques à un agresseur. La puissance de l'effet détermine le pourcentage de dégâts qui sera reflété pour chaque attaque. Tout dégât non réfléchi affecte normalement sa cible."
Magic_miscDetectHumanoid: "Détection des humanoïdes"
Magic_miscDetectHumanoidDesc: "Cet effet permet de détecter n'importe quelle entité animée par un esprit ; elles apparaissent sous forme de symboles sur la carte. Cet effet comprend tous les personnages. La puissance de l'effet détermine la portée à laquelle le lanceur peut détecter des individus (en pieds).",
Magic_miscRadiantShield: "Bouclier radieux"
Magic_miscRadiantShieldDesc: "Cet effet crée un bouclier de lumière brillante autour du sujet. La puissance de l'effet s'ajoute à la valeur d'armure du sujet, réduit considérablement les effets des attaques magiques, et aveugle brièvement les agresseurs au corps-à-corps."
Magic_miscRadiantShieldBlindness: "Brillance aveuglante"
Magic_miscWabbajack: "Wabbajack"
Magic_miscWabbajackDesc: "Wabbajack !"
Magic_miscInsight: "Perspicacité"
Magic_miscInsightDesc: "Cet effet influe légèrement sur le destin en augmentant les chances de découvrir des objets de valeur."
Magic_miscArmorResartus: "Armure raccommodée"
Magic_miscArmorResartusDesc: "Cet effet répare et recharge l'armure enchantée équipée par le lanceur. La puissance de l'effet correspond au nombre d'unités de condition et de charge restaurées, qui sont distribuées entre chacun des pièces d'armure enchantées du lanceur."
Magic_miscWeaponResartus: "Arme raccommodée"
Magic_miscWeaponResartusDesc: "Cet effet répare et recharge l'arme enchantée équipée par le lanceur. La puissance de l'effet correspond au nombre d'unités de condition et de charge restaurées."
Magic_miscCorruption: "Corruption"
Magic_miscCorruptionDesc: "Cet effet crée un double ténébreux de la cible qui aidera le lanceur au combat."
Magic_miscDistractCreature: "Distraction des créatures"
Magic_miscDistractCreatureDesc: "Cet effet incite une créature à s'éloigner de sa position actuelle tout en tentant de garder ses distances par rapport au lanceur. La puissance de l'effet correspond à la distance maximale à laquelle la cible peut s'éloigner de sa position, et l'effet ne peut être lancé à nouveau sur la cible tant qu'il est actif. Cet effet échouera si la cible a conscience de la présence du lanceur. Quand l'effet prend fin, la cibl commence à rejoindre sa position initiale et ne peut être distraite à nouveau jusqu'à ce qu'elle l'atteigne."
Magic_miscDistractHumanoid: "Distraction des humanoïdes"
Magic_miscDistractHumanoidDesc: "Cet effet incite une personne à s'éloigner de sa position actuelle tout en tentant de garder ses distances par rapport au lanceur. La puissance de l'effet correspond à la distance maximale à laquelle la cible peut s'éloigner de sa position, et l'effet ne peut être lancé à nouveau sur la cible tant qu'il est actif. Cet effet échouera si la cible a conscience de la présence du lanceur. Quand l'effet prend fin, la cible commence à rejoindre sa position initiale et ne peut être distraite à nouveau jusqu'à ce qu'elle l'atteigne."
Magic_miscGazeOfVeloth: "Regard de Véloth"
Magic_miscGazeOfVelothDesc: "Soyez témoin du visage de Véloth !"
Magic_miscDetectEnemy: "Détection des ennemis"
Magic_miscDetectEnemyDesc: "Cet effet permet de détecter n'importe quelle entité hostile ; elles apparaissent sous forme de symboles sur la carte. La puissance de l'effet détermine la portée à laquelle le lanceur peut détecter des entités hostiles (en pieds)."
Magic_miscDetectInvisibility: "Détection d'invisibilité"
Magic_miscDetectInvisibilityDesc: "Cet effet permet de détecter n'importe quelle entité affectée par un effet d'invisibilité ou de caméléon ; elles apparaissent sous forme de symboles sur la carte. La puissance de l'effet détermine la portée à laquelle le lanceur peut détecter des entités dissimulées (en pieds). Les effets d'invisibilité et de caméléon des entités détectées sont également affaiblis."
Magic_miscBlink: "Transfert"
Magic_miscBlinkDesc: "Cet effet téléporte le lanceur dans la direction vers laquelle il regarde. La puissance de l'effet correspond à la distance maximale qui peut être parcourue."
Magic_miscFortifyCasting: "Sorts fortifiés"
Magic_miscFortifyCastingDesc: "Cet effet augmente la chance du sujet de parvenir à lancer un sort."
Magic_miscPrismaticLight: "Lumière prismatique"
Magic_miscPrismaticLightDesc: "Cet effet crée un projectile de lumière prismatique. Quand il touche une cible, le projectile illumine la zone pour la durée de l'effet. Le projectile de lumière n'inflige aucun dégât."
Magic_miscBloodMagic: "Magie du sang"
Magic_miscBloodMagicDesc: "Placeholder"
Magic_miscSanguineRose: "Rose de Sanguiyn"
Magic_miscSanguineRoseDesc: "Cet effet permet d'invoquer un Daedra aléatoire des Royaumes extérieurs. Il apparaît à 2 mètres du lanceur et attaque toute entité hostile à son maître jusqu'à ce que le sort prenne fin ou qu'il soit tué. Quand il meurt ou que le sort prend fin, il disparaît et retourne dans les Royaumes extérieurs. En cas d'invocation en ville, les gardes vous attaqueront, vous et votre invocation."
Magic_miscDetectValuables: "Détection des objets précieux"
Magic_miscDetectValuablesDesc: "Cet effet permet de détecter les objets précieux valant au moins 4000 drakes ; ils apparaissent sous forme de symboles sur la carte. La puissance de l'effet détermine la portée à laquelle le lanceur peut détecter des objets précieux (en pieds)."
Magic_miscMagickaWard: "Barrière magique"
Magic_miscMagickaWardDesc: "Placeholder"
Magic_miscEthereal: "Forme éthérée"
Magic_miscEtherealDesc: "Le lanceur de cet effet revêt une forme incorporelle et peut traverser les autres entités. Le lanceur ne peut être blessé par celles-ci, mais ne peut pas non plus agir sur elles, lancer des sorts, utiliser des objets, ou généralement interagir physiquement avec le monde. Le lanceur ne peut pas traverser des objets comme des murs et obéit toujours aux lois de la gravité."

