Magic_miscPasswall: "Przeniknięcie Ściany"
Magic_miscPasswallDesc: "Pozwala przeniknąć przez stałe bariery w obszarach wewnętrznych do wolnej przestrzeni poza nimi. Efekt zawiedzie, jeśli miejsce docelowe jest wypełnione wodą, położone jest poza polem siłowym, zapieczętowaną bramą, lub znajduje się powyżej lub poniżej poziomu, na któym znajduje się rzucający zaklęcie."
Magic_miscBanish: "Wypędzenie Daedry"
Magic_miscBanishDesc: "Wypędza daedrę będącą celem zaklęcia, jeśli jej poziom jest wystarczająco niski w porównaniu ze stopniem efektu. Odniesione przez daedrę obrażenia powodują większą podatność na wypędzenie. W przypadku sukcesu ważniejszy dobytek daedry znajdzie się w pozostawionej pieczęci."
Magic_miscReflectDamage: "Odbicie Obrażeń"
Magic_miscReflectDamageDesc: "Odbija fizyczne obrażenia w stronę atakującego. Stopień efektu określa procentową ilość odbitych obrażeń dla każdego ataku. Nieodbite obrażenia odniosą normalny skutek."
Magic_miscDetectHumanoid: "Wykrycie Humanoida"
Magic_miscDetectHumanoidDesc: "Rzucający zaklęcie może wykrywać na odległość obecność istot humanoidalnych. Zostaną one oznaczone na mapie specjalnym symbolem. Efekt obejmuje wszystkie postacie, a jego poziom to promień (w stopach) obszaru, który zostanie magicznie przeszukany."
Magic_miscRadiantShield: "Tarcza Blasku"
Magic_miscRadiantShieldDesc: "Tworzy świetlistą osłonę dookoła celu. Stopień efektu dodawany jest do klasy pancerza. Odporność celu na szkodliwe efekty magiczne wzrasta. Dodatkowo, krótkotrwale oślepia przeciwników w zwarciu."
Magic_miscWabbajack: "Łabadżak"
Magic_miscWabbajackDesc: "Łabadżak!"
Magic_miscInsight: "Intuicja"
Magic_miscInsightDesc: "Nieznacznie wypacza los, zwiększając szansę na znalezienie wartościowych przedmiotów."
Magic_miscArmorResartus: "Odnowienie Pancerza"
Magic_miscArmorResartusDesc: "Odnawia wyposażony zaklęty pancerz. Stopień efektu odpowiada ilości ładunku oraz stanu, która zostanie przywrócona, rozdzielając punkty pomiędzy wszyskie wyposażone zaklęte elementy pancerza."
Magic_miscWeaponResartus: "Odnowienie Broni"
Magic_miscWeaponResartusDesc: "Odnawia wyposażony zaklęty oręż. Stopień efektu odpowiada ilości ładunku oraz stanu, która zostanie przywrócona."
Magic_miscCorruption: "Wypaczenie"
Magic_miscCorruptionDesc: "Tworzy cienisty odpowiednik celu, który wspomoże rzucającego zaklęcie w walce."
Magic_miscDistractCreature: "Rozproszenie Istoty"
Magic_miscDistractCreatureDesc: "Zmusza istotę do oddalenia się z obecnej pozycji, jednocześnie próbując zachować dystans od rzucającego zaklęcie. Stopień efektu określa maksymalną odległość (w stopach), jaką cel może przebyć. Jeśli cel jest już pod wpływem efektu, nie może być rzucony ponownie. Efekt zawiedzie, jeśli cel jest świadomy obecności rzucającego zaklęcie. Po zakończeniu trwania efektu, cel nie może zostać rozproszony, dopóki nie powróci do oryginalnej pozycji."
Magic_miscDistractHumanoid: "Rozproszenie Humanoida"
Magic_miscDistractHumanoidDesc: "Zmusza osobę do oddalenia się z obecnej pozycji, jednocześnie próbując zachować dystans od rzucającego zaklęcie. Stopień efektu określa maksymalną odległość (w stopach), jaką cel może przebyć. Jeśli cel jest już pod wpływem efektu, nie może być rzucony ponownie. Efekt zawiedzie, jeśli cel jest świadomy obecności rzucającego zaklęcie. Po zakończeniu trwania efektu, cel nie może zostać rozproszony, dopóki nie powróci do oryginalnej pozycji."
Magic_miscGazeOfVeloth: "Wejrzenie Velotha"
Magic_miscGazeOfVelothDesc: "Doświadcz Oblicza Velotha!"
Magic_miscDetectEnemy: "Wykrycie Przeciwnika"
Magic_miscDetectEnemyDesc: "Rzucający zaklęcie może wykrywać na odległość obecność istot niemechanicznych. Zostaną one oznaczone na mapie specjalnym symbolem. Efekt obejmuje wszystkich przeciwników, a jego poziom to promień (w stopach) obszaru, który zostanie magicznie przeszukany."
Magic_miscDetectInvisibility: "Wykrycie Niewidzialności"
Magic_miscDetectInvisibilityDesc: "Rzucający zaklęcie może wykrywać na odległość obecność istot niemechanicznych. Zostaną one oznaczone na mapie specjalnym symbolem. Efekt obejmuje wszystkie istoty pod wpływem efektu kameleona lub niewidzialności, a jego poziom to promień (w stopach) obszaru, który zostanie magicznie przeszukany. Wykryte efekty kameleona oraz niewidzialności zostaną również osłabione."
Magic_miscBlink: "Migotanie"
Magic_miscBlinkDesc: "Teleportuje rzucającego zaklęcie w kierunku, w który patrzy. Stopień efektu określa maksymalną odległość (w stopach), jaki cel może przebyć."
Magic_miscFortifyCasting: "Premia do Magii"
Magic_miscFortifyCastingDesc: "Tymczasowo zwiększa szanse postaci na skuteczne rzucenie zaklęcia."
Magic_miscPrismaticLight: "Pryzmatyczne Światło"
Magic_miscPrismaticLightDesc: "Tworzy magiczny pocisk, który po uderzeniu w cel rozświetla na pewien czas okolicę. Nie zadaje obrażeń."
Magic_miscBloodMagic: "Magia Krwi"
Magic_miscBloodMagicDesc: "Tekst zastępczy"
Magic_miscSanguineRose: "Róża Sanguine'a"
Magic_miscSanguineRoseDesc: "Przywołuje z Otchłani losową daedrę. Stworzenie pojawi się sześć stóp przed magiem i będzie atakowało każdą zagrażającą mu istotę, póki nie minie czas trwania efektu lub póki samo nie zostanie zabite. W obydwu przypadkach przywołana istota znika, powracając do Otchłani. Pamiętaj, że jeśli przywołasz istotę z innego wymiaru wewnątrz miasta, miejska straż rzuci się na ciebie bez ostrzeżenia!"
Magic_miscDetectValuables: "Wykrycie Kosztowności"
Magic_miscDetectValuablesDesc: "Rzucający zaklęcie może wykrywać na odległość kosztowne przedmioty. Stopień efektu określa promień (w stopach) obszaru, który zostanie magicznie przeszukany."

